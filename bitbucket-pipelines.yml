image: atlassian/default-image:3

definitions:
  services:
    docker:
      memory: 7168
  steps:
    - step: &build
        name: Build
        runs-on:
          - "self.hosted"
        size: 2x
        script:
          - bash ./run.sh build
        services:
          - docker
        caches:
          - docker

pipelines:
  branches:
    stage:
      - step: *build
      - step:
          name: Deploy Stage
          deployment: Staging
          image: google/cloud-sdk:alpine
          script:
            - bash ./run.sh stage
            
    create-ingest-endpoint:
      - step:
          name: Deploy Main
          deployment: Production
          image: google/cloud-sdk:alpine
          trigger: manual
          script:
            - bash ./run.sh deploy