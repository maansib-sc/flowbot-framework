# Development compose — hot reload, dev target
# Usage: docker compose -f docker-compose-dev.yml up --build

services:
  llm-chatbot:
    build:
      context: ./
      dockerfile: Dockerfile
      target: dev
    container_name: llm-chatbot
    environment:
      - NODE_OPTIONS=--max-old-space-size=4096
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
      - ../configurations:/app/configuration
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.llm-chatbot.rule=Host(`${CHAT_HOST}`)"
      - "traefik.http.routers.llm-chatbot.entrypoints=web"
      - "traefik.http.services.llm-chatbot.loadbalancer.server.port=80"
    networks:
      - docker_net

  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: always
    env_file:
      - .env
    ports:
      - 27017:27017
    volumes:
      - mongodb-data:/data/db
    networks:
      - docker_net

volumes:
  mongodb-data:

networks:
  docker_net:
    name: docker_default
    external: true
