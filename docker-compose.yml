# Production compose — for VM deployment

services:
  llm-chatbot:
    build:
      context: ./
      dockerfile: Dockerfile
      target: prod
      args:
        NEXT_PUBLIC_TDB_TTT_SERVICE: ${NEXT_PUBLIC_TDB_TTT_SERVICE}
        NEXT_PUBLIC_TDB_TTT_SERVICE_AUTHORIZATION: ${NEXT_PUBLIC_TDB_TTT_SERVICE_AUTHORIZATION}
        NEXT_PUBLIC_NEXTAUTH_URL: ${NEXT_PUBLIC_NEXTAUTH_URL}
        NEXT_PUBLIC_DEFAULT_CHAT_ID: ${NEXT_PUBLIC_DEFAULT_CHAT_ID}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    restart: unless-stopped
    env_file:
      - .env
    logging:
      options:
        max-size: "50m"
        max-file: "3"
    volumes:
      - ../configurations:/app/configuration
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${CHAT_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=le"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=80"
    networks:
      - docker

  mongodb:
    image: mongo:7
    logging:
      options:
        max-size: "50m"
        max-file: "3"
    restart: always
    volumes:
      - mongodb-data:/data/db
    networks:
      - docker

volumes:
  mongodb-data:

networks:
  docker:
    external: true
    name: docker
