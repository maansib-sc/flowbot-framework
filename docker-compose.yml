# Production compose — for VM deployment

services:
  llm-chatbot:
    build:
      context: ./
      dockerfile: Dockerfile
      target: prod
      args:
        NEXT_PUBLIC_TDB_TTT_SERVICE: ${NEXT_PUBLIC_TDB_TTT_SERVICE}
        NEXT_PUBLIC_TDB_TTT_SERVICE_AUTHORIZATION: ${NEXT_PUBLIC_TDB_TTT_SERVICE_AUTHORIZATION}
        NEXT_PUBLIC_NEXTAUTH_URL: ${NEXT_PUBLIC_NEXTAUTH_URL}
        NEXT_PUBLIC_DEFAULT_CHAT_ID: ${NEXT_PUBLIC_DEFAULT_CHAT_ID}
    container_name: llm-chatbot
    restart: unless-stopped
    logging:
      options:
        max-size: "50m"
        max-file: "3"
    env_file:
      - .env
    volumes:
      - ../configurations:/app/configuration
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.llm-chatbot.rule=Host(`${CHAT_HOST}`)"
      - "traefik.http.routers.llm-chatbot.entrypoints=websecure"
      - "traefik.http.routers.llm-chatbot.tls.certresolver=le"
      - "traefik.http.services.llm-chatbot.loadbalancer.server.port=80"
    networks:
      - docker_net

  mongodb:
    image: mongo:7
    container_name: mongodb
    logging:
      options:
        max-size: "50m"
        max-file: "3"
    restart: always
    env_file:
      - .env
    ports:
      - 27017:27017
    volumes:
      - mongodb-data:/data/db
    networks:
      - docker_net

volumes:
  mongodb-data:

networks:
  docker_net:
    external: true
    name: docker_default
