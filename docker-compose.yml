services:
  traefik:
    image: traefik:v3.6.4
    container_name: traefik
    restart: unless-stopped
    logging:
      options:
        max-size: "50m"
        max-file: "3"
    command:
      - --log.level=INFO
      - --providers.docker=true
      - --providers.docker.exposedbydefault=true
      # HTTP entrypoint -> redirect to HTTPS
      - --entryPoints.web.address=:80
      - --entryPoints.web.http.redirections.entryPoint.to=websecure
      - --entryPoints.web.http.redirections.entryPoint.scheme=https
      # HTTPS entrypoint with Let's Encrypt
      - --entryPoints.websecure.address=:443
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --certificatesresolvers.le.acme.email=admin@talkingdb.io
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - docker_net

  llm-chatbot:
    build:
      context: ./
      dockerfile: Dockerfile
      target: prod
    container_name: llm-chatbot
    restart: unless-stopped
    logging:
      options:
        max-size: "50m"
        max-file: "3"
    env_file:
      - .env
    volumes:
      # Add new bots here as siblings of flowbot-framework.
      - ../configurations:/app/configuration
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.llm-chatbot.rule=Host(`${CHAT_HOST}`)"
      - "traefik.http.routers.llm-chatbot.entrypoints=websecure"
      - "traefik.http.routers.llm-chatbot.tls.certresolver=le"
      - "traefik.http.services.llm-chatbot.loadbalancer.server.port=80"
    networks:
      - docker_net

  mongodb:
    image: mongo:7
    container_name: mongodb
    logging:
      options:
        max-size: "50m"
        max-file: "3"
    restart: always
    env_file:
      - .env
    ports:
      - 27017:27017
    volumes:
      - mongodb-data:/data/db
    networks:
      - docker_net

volumes:
  mongodb-data:


networks:
  docker_net:
    driver: bridge
